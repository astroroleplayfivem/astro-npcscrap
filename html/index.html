<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro NPC Scrap</title><link rel="stylesheet" href="style.css">
</head>
<body>
<main id="app" class="hidden">
<section class="panel">
<header><div><h1>ASTRO NPC SCRAP</h1><p id="plate">PLATE</p></div><button id="close">×</button></header>
<div class="stats"><div><span>Grade</span><strong id="grade">-</strong></div><div><span>Rep</span><strong id="rep">0</strong></div><div><span>Level</span><strong id="level">Rookie</strong></div></div>
<section class="grid" id="actions"></section>
<section class="trading"><h2>SCRAPYARD TRADING</h2><div id="trades"></div></section>
<section class="orders"><h2>ORDERS</h2><div id="orders"></div></section>
</section>
</main>
<script src="app.js"></script>
</body>
</html>
